backend:
  name: git-gateway
  branch: main
publish_mode: simple
media_folder: "src/images"
public_folder: "/images"

collections:
  - name: "board"
    label: "Board Members"
    folder: "src/board"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Name", name: "name", widget: "string"}
      - {label: "Role", name: "role", widget: "string"}
      - {label: "Qualifications", name: "qualifications", widget: "string"}
      - {label: "Location", name: "location", widget: "string"}
      - {label: "Email", name: "email", widget: "string", required: false}
      - {label: "LinkedIn", name: "linkedin", widget: "string", required: false}
      - {label: "Image", name: "image", widget: "image", required: false}
      - {label: "Summary", name: "summary", widget: "markdown"}
      - {label: "Layout", name: "layout", widget: "hidden", default: "layouts/member.html"}

  - name: "team"
    label: "Team Members"
    folder: "src/team"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Name", name: "name", widget: "string"}
      - {label: "Role", name: "role", widget: "string"}
      - {label: "Qualifications", name: "qualifications", widget: "string", required: false}
      - {label: "Location", name: "location", widget: "string"}
      - {label: "Email", name: "email", widget: "string", required: false}
      - {label: "LinkedIn", name: "linkedin", widget: "string", required: false}
      - {label: "Image", name: "image", widget: "image", required: false}
      - {label: "Large Image", name: "imageLarge", widget: "image", required: false}
      - {label: "Summary", name: "summary", widget: "markdown"}
      - {label: "Block Quote", name: "blockQuote", widget: "text", required: false}
      - {label: "Detailed Bio", name: "body", widget: "markdown"}
      - {label: "Layout", name: "layout", widget: "hidden", default: "layouts/member.html"}

  - name: "faqs"
    label: "FAQs"
    folder: "src/faqs"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Question", name: "title", widget: "string"}
      - {label: "Answer", name: "body", widget: "markdown"}
      - label: "Categories"
        name: "categories"
        widget: "list"
        default: ["general"]
        field:
          label: "Category"
          name: "category"
          widget: "select"
          options:
            - "about"
            - "contact"
            - "general"
      - {label: "Layout", name: "layout", widget: "hidden", default: "layouts/base.html"}

  - name: "scenarios"
    label: "Scenarios"
    folder: "src/scenarios"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Summary", name: "summary", widget: "text"}
      - {label: "Display Order", name: "order", widget: "number", value_type: "int", min: 1, default: 1}
      - {label: "Permalink", name: "permalink", widget: "hidden", default: false}

  - name: "lexicon"
    label: "Lexicon Terms"
    folder: "src/lexicon"
    create: true
    slug: "{{slug}}"
    fields:
    - {label: "Term", name: "title", widget: "string"}
    - {label: "Author", name: "author", widget: "string", required: false}
    - {label: "Short biography", name: "bio", widget: "string", required: false}
    - {label: "Summary", name: "summary", widget: "text"}
    - {label: "Detailed Description", name: "body", widget: "markdown"}
    - label: "Categories"
      name: "categories"
      widget: "list"
      field:
        label: "Category"
        name: "category"
        widget: "select"
        options:
          - "Lexicon"
    - {label: "Featured Term", name: "featured", widget: "boolean", default: false}
    - {label: "Popular Term", name: "popular", widget: "boolean", default: false}
    - {label: "Wikipedia URL", name: "url", widget: "string", required: false}
    - label: "PDF File"
      name: "pdf"
      widget: "file"
      required: false
      media_folder: "../files"
      public_folder: "/files"
      hint: "Use PDF File for uploaded documents."
    - {label: "Layout", name: "layout", widget: "hidden", default: "layouts/term.html"}

  - name: "blog"
    label: "Blog Posts"
    folder: "src/posts"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Author", name: "postAuthor", widget: "string"}
      - {label: "Publish Date", name: "postDate", widget: "datetime"}
      - {label: "Summary", name: "postSummary", widget: "text"}
      - {label: "Featured Image", name: "image", widget: "image", required: false}
      - {label: "Image Caption", name: "imageCaption", widget: "string", required: false}
      - label: "Categories"
        name: "postCategories"
        widget: "list"
        field:
          label: "Category"
          name: "category"
          widget: "select"
          options:
            - "Articles"
            - "Books"
            - "Events"
            - "Papers"
      - label: "Tags"
        name: "postTags"
        widget: "list"
        field:
          label: "Tag"
          name: "tag"
          widget: "select"
          options:
            - "Articles"
            - "Books"
            - "Papers"
      - {label: "Body", name: "body", widget: "markdown"}

  - name: "resources"
    label: "Resources"
    folder: "src/resources"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Title", name: "item-title", widget: "string"}
      - {label: "Author", name: "item-author", widget: "string"}
      - {label: "Author Bio", name: "item-author-bio", widget: "text", required: false}
      - {label: "Publication Date", name: "item-date", widget: "datetime"}
      - {label: "Resource Type", name: "item-type", widget: "string"}
      - label: "PDF File"
        name: "item-file"
        widget: "file"
        required: false
        media_folder: "../files"
        public_folder: "/files"
        hint: "Use PDF File for uploaded documents."
      - {label: "External URL", name: "item-url", widget: "string", required: false, hint: "Use External URL only for off-site links."}
      - {label: "Summary", name: "item-summary", widget: "text"}
      - label: "Categories"
        name: "item-categories"
        widget: "list"
        hint: "Choose one or more from the existing categories."
        field:
          label: "Category"
          name: "category"
          widget: "select"
          options:
            - "Background papers"
            - "Policy Reports"
            - "Articles and books"
            - "Videos and events"
            - "Podcasts"
      - label: "Tags"
        name: "item-tags"
        widget: "list"
        field:
          label: "Tag"
          name: "tag"
          widget: "select"
          options:
            - "A Land for All"

  - name: "pages"
    label: "Pages"
    files:
      - label: "Privacy Policy"
        name: "privacy"
        file: "src/privacy.md"
        fields:
          - {label: "Title", name: "title", widget: "string"}
          - {label: "Meta Description", name: "metaDesc", widget: "string", required: false}
          - {label: "Layout", name: "layout", widget: "hidden", default: "layouts/page.html"}
          - {label: "Permalink", name: "permalink", widget: "hidden", default: "/privacy/"}
          - {label: "Body", name: "body", widget: "markdown"}

      - label: "Our Team"
        name: "team"
        file: "src/team.md"
        fields:
          - {label: "Title", name: "title", widget: "string"}
          - {label: "Meta Description", name: "metaDesc", widget: "string", required: false}
          - {label: "Layout", name: "layout", widget: "hidden", default: "layouts/team.html"}
          - {label: "Permalink", name: "permalink", widget: "hidden", default: "/team/"}
          - {label: "Sidebar Content", name: "aside", widget: "markdown", required: false}
          - {label: "Body", name: "body", widget: "markdown", required: false}

      - label: "Home"
        name: "home"
        file: "src/index.md"
        fields:
          - {label: "Title", name: "title", widget: "string"}
          - {label: "Meta Description", name: "metaDesc", widget: "string", required: false}
          - {label: "Layout", name: "layout", widget: "hidden", default: "layouts/home.html"}
          - {label: "Main Content", name: "main", widget: "markdown", required: false}
          - {label: "Sidebar Content", name: "aside", widget: "markdown", required: false}

      - label: "Highlights"
        name: "blog"
        file: "src/blog.md"
        fields:
          - {label: "Title", name: "title", widget: "string"}
          - {label: "Meta Description", name: "metaDesc", widget: "string", required: false}
          - {label: "Featured Image", name: "featureImage", widget: "image", required: false}
          - {label: "Image Caption", name: "featureImageCaption", widget: "string", required: false}
          - {label: "Layout", name: "layout", widget: "hidden", default: "layouts/feed.html"}
          - label: "Pagination"
            name: "pagination"
            widget: "object"
            fields:
              - {label: "Data Source", name: "data", widget: "hidden", default: "collections.blog"}
              - {label: "Page Size", name: "size", widget: "number", value_type: "int", default: 10}
          - {label: "Previous Label", name: "paginationPrevText", widget: "string", required: false}
          - {label: "Next Label", name: "paginationNextText", widget: "string", required: false}
          - {label: "Pagination Anchor", name: "paginationAnchor", widget: "string", required: false}
          - {label: "Permalink", name: "permalink", widget: "hidden", default: "blog{% if pagination.pageNumber > 0 %}/page/{{ pagination.pageNumber }}{% endif %}/index.html"}

      - label: "Advisory Board"
        name: "board"
        file: "src/board.md"
        fields:
          - {label: "Title", name: "title", widget: "string"}
          - {label: "Meta Description", name: "metaDesc", widget: "string", required: false}
          - {label: "Layout", name: "layout", widget: "hidden", default: "layouts/board.html"}
          - {label: "Permalink", name: "permalink", widget: "hidden", default: "/board/"}

      - label: "Contact"
        name: "contact"
        file: "src/contact.md"
        fields:
          - {label: "Title", name: "title", widget: "string"}
          - {label: "Meta Description", name: "metaDesc", widget: "string", required: false}
          - {label: "Featured Image", name: "featureImage", widget: "image", required: false}
          - {label: "Image Caption", name: "featureImageCaption", widget: "string", required: false}
          - {label: "Layout", name: "layout", widget: "hidden", default: "layouts/contact.html"}
          - {label: "Permalink", name: "permalink", widget: "hidden", default: "/contact/"}
          - {label: "Sidebar Content", name: "aside", widget: "markdown", required: false}

      - label: "FAQs Page"
        name: "faqs_page"
        file: "src/faqs.md"
        fields:
          - {label: "Title", name: "title", widget: "string"}
          - {label: "Meta Description", name: "metaDesc", widget: "string", required: false}
          - {label: "Featured Image", name: "featureImage", widget: "image", required: false}
          - {label: "Layout", name: "layout", widget: "hidden", default: "layouts/page.html"}
          - {label: "Permalink", name: "permalink", widget: "hidden", default: "/faqs/"}
          - {label: "Sidebar Content", name: "aside", widget: "markdown", required: false}

      - label: "Our Partners"
        name: "partners"
        file: "src/partners.md"
        fields:
          - {label: "Title", name: "title", widget: "string"}
          - {label: "Meta Description", name: "metaDesc", widget: "string", required: false}
          - {label: "Layout", name: "layout", widget: "hidden", default: "layouts/page.html"}
          - {label: "Permalink", name: "permalink", widget: "hidden", default: "/partners/"}
          - {label: "Lede", name: "lede", widget: "markdown", required: false}
          - {label: "Body", name: "body", widget: "markdown", required: false}

      - label: "Lexicon Grid"
        name: "lexicon_grid"
        file: "src/lexicon-grid.md"
        fields:
          - {label: "Title", name: "title", widget: "string"}
          - {label: "Meta Description", name: "metaDesc", widget: "string", required: false}
          - {label: "Layout", name: "layout", widget: "hidden", default: "layouts/lexicon-grid.html"}
          - {label: "Permalink", name: "permalink", widget: "hidden", default: "/lexicon-grid/"}
          - {label: "Sidebar Content", name: "aside", widget: "markdown", required: false}
          - {label: "Body", name: "body", widget: "markdown", required: false}

      - label: "Featured Lexicon Terms"
        name: "lexicon-featured"
        file: "src/lexicon-featured.md"
        fields:
          - {label: "Title", name: "title", widget: "string"}
          - {label: "Meta Description", name: "metaDesc", widget: "string", required: false}
          - {label: "Summary", name: "summary", widget: "text", required: false}
          - {label: "Layout", name: "layout", widget: "hidden", default: "layouts/lexicon-featured.html"}
          - {label: "Permalink", name: "permalink", widget: "hidden", default: "/lexicon-featured/"}
          - {label: "Sidebar Content", name: "aside", widget: "markdown", required: false}
          - {label: "Body", name: "body", widget: "markdown", required: false}

      - label: "Lexicon List"
        name: "lexicon_list"
        file: "src/lexicon-list.md"
        fields:
          - {label: "Title", name: "title", widget: "string"}
          - {label: "Meta Description", name: "metaDesc", widget: "string", required: false}
          - {label: "Layout", name: "layout", widget: "hidden", default: "layouts/lexicon-list.html"}
          - {label: "Permalink", name: "permalink", widget: "hidden", default: "/lexicon-list/"}
          - {label: "Sidebar Content", name: "aside", widget: "markdown", required: false}

      - label: "Photo Gallery"
        name: "gallery"
        file: "src/gallery.md"
        fields:
          - {label: "Title", name: "title", widget: "string"}
          - {label: "Meta Description", name: "metaDesc", widget: "string", required: false}
          - {label: "Layout", name: "layout", widget: "hidden", default: "layouts/photos.html"}
          - {label: "Sidebar Content", name: "aside", widget: "markdown", required: false}
          - {label: "Body", name: "body", widget: "markdown", required: false}

      - label: "Background"
        name: "background"
        file: "src/background.md"
        fields:
          - {label: "Title", name: "title", widget: "string"}
          - {label: "Meta Description", name: "metaDesc", widget: "string", required: false}
          - {label: "Layout", name: "layout", widget: "hidden", default: "layouts/page.html"}
          - {label: "Permalink", name: "permalink", widget: "hidden", default: "/background/"}
          - {label: "Body", name: "body", widget: "markdown"}

      - label: "Future Scenarios Page"
        name: "scenarios_page"
        file: "src/scenarios.md"
        fields:
          - {label: "Title", name: "title", widget: "string"}
          - {label: "Meta Description", name: "metaDesc", widget: "string", required: false}
          - {label: "Layout", name: "layout", widget: "hidden", default: "layouts/scenarios.html"}
          - {label: "Permalink", name: "permalink", widget: "hidden", default: "/scenarios/"}
          - {label: "Body", name: "body", widget: "markdown", required: false}

      - label: "Knowledge Hub"
        name: "knowledge_hub"
        file: "src/resources.html"
        fields:
          - {label: "Title", name: "title", widget: "string"}
          - {label: "Meta Description", name: "metaDesc", widget: "string", required: false}
          - {label: "Layout", name: "layout", widget: "hidden", default: "layouts/base.html"}
          - {label: "Summary", name: "summary", widget: "text", required: false}

      - label: "Resource Category Summaries"
        name: "resource_category_summaries"
        file: "src/_data/resource-category-summaries.json"
        fields:
          - label: "Categories"
            name: "categories"
            widget: "list"
            summary: "{{fields.name}}"
            fields:
              - {label: "Category", name: "name", widget: "string", hint: "Must match the resource category exactly."}
              - {label: "Summary", name: "summary", widget: "text"}

      - label: "About the Project"
        name: "about"
        file: "src/about.md"
        fields:
          - {label: "Title", name: "title", widget: "string"}
          - {label: "Meta Description", name: "metaDesc", widget: "string", required: false}
          - {label: "Featured Image", name: "featureImage", widget: "image", required: false}
          - {label: "Image Caption", name: "featureImageCaption", widget: "string", required: false}
          - {label: "Layout", name: "layout", widget: "hidden", default: "layouts/about.html"}
          - {label: "Permalink", name: "permalink", widget: "hidden", default: "/about/"}
          - {label: "Lede", name: "lede", widget: "markdown", required: false}
          - {label: "Main Content", name: "main", widget: "markdown", required: false}
          - {label: "Extended Content", name: "extended", widget: "markdown", required: false}
          - {label: "About Sidebar Background", name: "background", widget: "markdown", required: false, hint: "This controls the 'Project background' box on the About page sidebar (not the separate Background page)."}
